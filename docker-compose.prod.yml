name: votebroker

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: votebroker-api:production
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      VOTEBROKER_FEE_BPS: ${VOTEBROKER_FEE_BPS:-300}
      VOTEBROKER_MIN_FEE_USD: ${VOTEBROKER_MIN_FEE_USD:-0.05}
      VOTEBROKER_FEE_POST_AUTHOR: ${VOTEBROKER_FEE_POST_AUTHOR:-votebroker}
      VOTEBROKER_FEE_POST_PERMLINK: ${VOTEBROKER_FEE_POST_PERMLINK:-monthly-fees}
      VOTEBROKER_WARNING_AFTER_FAILURES: ${VOTEBROKER_WARNING_AFTER_FAILURES:-2}
      VOTEBROKER_PAUSE_AFTER_FAILURES: ${VOTEBROKER_PAUSE_AFTER_FAILURES:-4}
      VOTEBROKER_FREE_UNTIL_VOTE_USD: ${VOTEBROKER_FREE_UNTIL_VOTE_USD:-0.25}
      VOTEBROKER_DONATION_UNTIL_VOTE_USD: ${VOTEBROKER_DONATION_UNTIL_VOTE_USD:-1}
      VOTEBROKER_MAX_FEE_VOTE_WEIGHT_BPS: ${VOTEBROKER_MAX_FEE_VOTE_WEIGHT_BPS:-2000}
      VOTEBROKER_GRACE_CONSECUTIVE_FAILURES: ${VOTEBROKER_GRACE_CONSECUTIVE_FAILURES:-2}
      VOTEBROKER_OPERATOR_TOKEN: ${VOTEBROKER_OPERATOR_TOKEN:-}
      STEEMCONNECT_HOST: ${STEEMCONNECT_HOST:-https://hivesigner.com}
      STEEMCONNECT_CLIENT_ID: ${STEEMCONNECT_CLIENT_ID:-votebroker}
      STEEMCONNECT_CLIENT_SECRET: ${STEEMCONNECT_CLIENT_SECRET:-}
      STEEMCONNECT_RESPONSE_TYPE: ${STEEMCONNECT_RESPONSE_TYPE:-token}
      STEEMCONNECT_REDIRECT_URI: ${STEEMCONNECT_REDIRECT_URI:-https://votebroker.org/auth/callback}
      STEEMCONNECT_SCOPES: ${STEEMCONNECT_SCOPES:-login,vote}
    expose:
      - "3000"
    networks:
      - votebroker_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE: /api
    image: votebroker-web:production
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    expose:
      - "80"
    networks:
      - votebroker_internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - votebroker_internal

networks:
  votebroker_internal:
    name: votebroker_internal

volumes:
  caddy_data:
    name: votebroker_caddy_data
  caddy_config:
    name: votebroker_caddy_config
