# VoteBroker Showcase — Story-driven Screenshot Annotations
# ============================================================
# REGELN:
# 1. find_text muss exakt mit sichtbarem DOM-Text übereinstimmen
# 2. ready_text definiert, wann der View bereit ist für den Screenshot
# 3. Marker markiert nur, was der story-Text erklärt
# 4. Kein Marker ohne Textbezug
#
# Validation vor jedem Screenshot:
#   a) Tab/View navigieren
#   b) Warten bis ready_text sichtbar (timeout: 8s → warning)
#   c) Erst dann Screenshot + Marker-Suche

sections:

  # ── 1. Chancen finden ─────────────────────────────────────────────────────
  - id: find_votes
    filename: "01_find_votes"
    title: "Chancen finden"
    story: |
      VoteBroker durchsucht alle Beiträge deiner Autoren-Strategie
      und findet neue Voting-Chancen – vollautomatisch.
    tab: dna
    ready_text: "Offene Posts suchen"   # bestätigt: DNA-Tab geladen
    actions:
      - type: wait_ms
        ms: 1500
    markers:
      - label: "① Posts suchen"
        find_text: "Offene Posts suchen →"   # exakter Button-Text mit Pfeil
        fallback: "Offene Posts suchen"
        anchor: center
      - label: "② Kurator-Typ"
        find_text: "Regular Curator"
        fallback: "Regelmäßiger Kurator"
        anchor: top_right
      - label: "③ VP jetzt"
        find_text: "VP JETZT"
        anchor: below

  # ── 2. Vote-Plan erstellen ────────────────────────────────────────────────
  - id: vote_plan
    filename: "02_vote_plan"
    title: "Vote-Plan erstellen"
    story: |
      Nach dem Scan berechnet VoteBroker automatisch einen VP-schonenden Plan:
      welche Posts, in welcher Reihenfolge, mit welchem VP-Effekt morgen.
    tab: dna
    ready_text: "NACH PLAN"             # bestätigt: Plan mit VP-Boxen sichtbar
    actions:
      - type: click_text
        text: "Offene Posts suchen"
        wait_after_ms: 3500
      - type: click_text
        text: "Vote-Plan generieren"
        wait_after_ms: 4000
    markers:
      - label: "① Plan aktiv"
        find_text: "Alles gevoted"        # nach Ausführung — Plan abgeschlossen
        fallback: "Votes gefunden"        # oder: offene Votes vorhanden
        anchor: center
      - label: "② VP nach Plan"
        find_text: "NACH PLAN"
        anchor: below
      - label: "③ VP morgen"
        find_text: "VP MORGEN"
        anchor: below

  # ── 3. Strategie — immer sichtbar ────────────────────────────────────────
  - id: edit_weights
    filename: "03_edit_weights"
    title: "Strategie konfigurieren"
    story: |
      Die Autoren-Strategie zeigt VP jetzt, VP nach Plan und VP morgen.
      Jeder Autor hat ein Kategorien-Tag. Gewichtungen lassen sich jederzeit anpassen.
    tab: dna
    scroll_y: 0
    ready_text: "VP JETZT"              # VP-Boxen — immer sichtbar nach Tab-Load
    actions:
      - type: wait_ms
        ms: 1000
    markers:
      - label: "① VP jetzt"
        find_text: "VP JETZT"
        anchor: below
      - label: "② VP morgen"
        find_text: "VP MORGEN"
        anchor: below
      - label: "③ Strategie"
        find_text: "Autoren-Strategie"  # Akkordeon-Header — immer sichtbar
        fallback: "Strategie:"
        anchor: top_right

  # ── 4. Kontrolle — kein autonomes Handeln ────────────────────────────────
  - id: confirm_votes
    filename: "04_confirm_votes"
    title: "Du entscheidest immer"
    story: |
      VoteBroker schlägt vor, du entscheidest. Kein Vote läuft ohne deine
      Freigabe. Das Kurator-Profil zeigt deinen Typ und deine Aktivität.
    tab: dna
    scroll_y: 0
    ready_text: "Regular Curator"       # Kurator-Profil — immer sichtbar
    actions:
      - type: wait_ms
        ms: 500
    markers:
      - label: "① Kurator-Profil"
        find_text: "Regular Curator"
        fallback: "Regelmäßiger Kurator"
        anchor: top_right
      - label: "② Aktive Tage"
        find_text: "Akt. Tage"
        fallback: "Aktive Tage"
        anchor: below

  # ── 5. Dashboard — Ergebnisse ─────────────────────────────────────────────
  - id: dashboard_results
    filename: "05_dashboard"
    title: "Dashboard – was es gebracht hat"
    story: |
      Nach der Ausführung zeigt das Dashboard alle Auswirkungen auf einen Blick:
      Votes heute, Pending Curation der nächsten 7 Tage und das verdiente SP
      der letzten 30 Tage.
    tab: dashboard
    scroll_y: 0
    ready_text: "VERDIENT · 30 TAGE"   # bestätigt: Dashboard-Tab mit Cards geladen
    actions:
      - type: wait_ms
        ms: 2500
    markers:
      - label: "① Votes heute"
        find_text: "HEUTE"
        anchor: top_right
      - label: "② Pending · 7 Tage"
        find_text: "PENDING · 7 TAGE"  # exakte Karten-Überschrift
        fallback: "Pending · 7 Tage"
        anchor: top_right
      - label: "③ Verdient · 30 Tage"
        find_text: "VERDIENT · 30 TAGE"  # exakte Karten-Überschrift
        fallback: "Verdient · 30 Tage"
        anchor: top_right
      # VP-Chart ist SVG — kein DOM-Textelement, daher kein 4. Marker möglich

  # ── 6. Community — neue Autoren entdecken ─────────────────────────────────
  - id: community
    filename: "06_community"
    title: "Neue Autoren entdecken"
    story: |
      Der Community-Tab zeigt Autoren, die andere VoteBroker-Kuratoren bereits
      unterstützen – aber noch nicht in deiner Strategie sind.
      Ein Klick fügt sie direkt hinzu.
    tab: community
    ready_text: "Autor-Radar"           # bestätigt: Community-Tab geladen
    actions:
      - type: wait_ms
        ms: 4000                        # Community-Daten laden lazy
    markers:
      - label: "① Autor-Radar"
        find_text: "Entdecken · Autor-Radar"  # Seitenüberschrift
        fallback: "Autor-Radar"
        anchor: top_right
      - label: "② Entdeckungen"
        find_text: "ENTDECKUNGEN FÜR DICH"   # Spaltenheader rechts
        fallback: "Entdeckungen für dich"
        anchor: top_right
      - label: "③ Zur Strategie"
        find_text: "+ Zur Strategie"
        anchor: center
