<!-- VoteBroker — Favicon & PWA head tags
     Place these in <head>. Paths assume /assets/branding/favicon/ -->

<link rel="icon" type="image/x-icon" href="/assets/branding/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="16x16" href="/assets/branding/favicon/favicon-16.png">
<link rel="icon" type="image/png" sizes="32x32" href="/assets/branding/favicon/favicon-32.png">
<link rel="icon" type="image/png" sizes="48x48" href="/assets/branding/favicon/favicon-48.png">
<link rel="icon" type="image/svg+xml" href="/assets/branding/logo/icon.svg">

<link rel="apple-touch-icon" sizes="180x180" href="/assets/branding/favicon/apple-touch-icon.png">

<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#0B1020">
<meta name="msapplication-TileColor" content="#0B1020">

<!-- Open Graph / social -->
<meta property="og:image" content="/assets/branding/social/avatar-twitter.png">
<meta name="twitter:card" content="summary">
<meta name="twitter:image" content="/assets/branding/social/avatar-twitter.png">
