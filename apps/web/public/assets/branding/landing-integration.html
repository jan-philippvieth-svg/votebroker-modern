<!-- ============================================================
     VoteBroker — Landing Page Integration Modules
     Brand Direction: A2 "Active Hub — Signal Processing"

     These are DROP-IN modules for the existing live landing page.
     They are framework-agnostic (plain HTML/CSS/JS) and namespaced
     under .vb- so they won't collide with existing styles.

     Import design tokens first:
       <link rel="stylesheet" href="/assets/branding/votebroker-tokens.css">
     And Poppins (or self-host):
       <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;500;700;800&display=swap" rel="stylesheet">
     ============================================================ -->

<style>
/* ---------- shared ---------- */
.vb-scope { font-family: var(--vb-font-sans); color: var(--vb-text-100); }

/* ---------- 1. HEADER ---------- */
.vb-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: var(--vb-space-4) var(--vb-space-8);
  background: rgba(11,16,32,0.72);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(37,99,235,0.18);
  position: sticky; top: 0; z-index: 100;
}
.vb-brand { display: flex; align-items: center; gap: var(--vb-space-3); text-decoration: none; }
.vb-brand svg, .vb-brand img { width: 38px; height: 38px; flex: none; }
.vb-brand .vb-wordmark { font-size: 22px; letter-spacing: -0.02em; line-height: 1; }
.vb-wordmark .v { font-weight: 200; color: var(--vb-text-100); }
.vb-wordmark .b { font-weight: 800; background: var(--vb-grad-brand);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.vb-nav { display: flex; gap: var(--vb-space-6); align-items: center; }
.vb-nav a { color: var(--vb-text-500); text-decoration: none; font-size: 14px; font-weight: 500;
  transition: color .15s; }
.vb-nav a:hover { color: var(--vb-text-100); }
.vb-cta { background: var(--vb-grad-brand); color: #fff; padding: 9px 18px;
  border-radius: var(--vb-radius-md); font-weight: 600; font-size: 14px; border: none; cursor: pointer; }

/* ---------- 2. HERO ---------- */
.vb-hero { position: relative; overflow: hidden;
  background: var(--vb-grad-surface); padding: var(--vb-space-24) var(--vb-space-8); }
.vb-hero-bg { position: absolute; inset: 0; z-index: 0; pointer-events: none; }
.vb-hero-inner { position: relative; z-index: 2; max-width: 1100px; margin: 0 auto;
  display: grid; grid-template-columns: 1.1fr 0.9fr; gap: var(--vb-space-12); align-items: center; }
.vb-eyebrow { font-size: 13px; letter-spacing: var(--vb-tracking-wide); color: var(--vb-cyan-400);
  text-transform: uppercase; margin-bottom: var(--vb-space-4); }
.vb-hero h1 { font-size: clamp(2.2rem, 5vw, 3.6rem); font-weight: 200; line-height: 1.08;
  letter-spacing: var(--vb-tracking-tight); margin: 0 0 var(--vb-space-6); }
.vb-hero h1 strong { font-weight: 800; background: var(--vb-grad-brand);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
.vb-hero p { font-size: var(--vb-text-lg); color: var(--vb-text-500); max-width: 46ch;
  margin: 0 0 var(--vb-space-8); line-height: 1.6; }
.vb-hero-actions { display: flex; gap: var(--vb-space-4); }
.vb-btn-primary { background: var(--vb-grad-brand); color: #fff; padding: 13px 26px;
  border-radius: var(--vb-radius-md); font-weight: 600; border: none; cursor: pointer; font-size: 15px; }
.vb-btn-ghost { background: transparent; color: var(--vb-text-100); padding: 13px 26px;
  border-radius: var(--vb-radius-md); font-weight: 500; border: 1px solid rgba(255,255,255,0.16);
  cursor: pointer; font-size: 15px; }
.vb-hero-mark { display: flex; justify-content: center; }
.vb-hero-mark svg { width: 100%; max-width: 360px; height: auto; }
@media (max-width: 820px) {
  .vb-hero-inner { grid-template-columns: 1fr; text-align: center; }
  .vb-hero p { margin-left: auto; margin-right: auto; }
  .vb-hero-actions { justify-content: center; }
  .vb-hero-mark { order: -1; }
}
</style>

<!-- ===== HEADER MARKUP ===== -->
<header class="vb-header vb-scope">
  <a class="vb-brand" href="/">
    <!-- inline icon (static); swap to icon-animated.svg for motion -->
    <img src="/assets/branding/logo/icon.svg" alt="VoteBroker" width="38" height="38">
    <span class="vb-wordmark"><span class="v">VOTE</span><span class="b">BROKER</span></span>
  </a>
  <nav class="vb-nav">

    <a href="#docs">Docs</a>

  </nav>
</header>

<!-- ===== HERO MARKUP ===== -->
<section class="vb-hero vb-scope vb-animated">
  <canvas class="vb-hero-bg" id="vbNetworkBg"></canvas>
  <div class="vb-hero-inner">
    <div>
      <div class="vb-eyebrow">Community Intelligence · Signal Analytics</div>
      <h1>Smarter Curating.<br><strong>Stable Voting Power.</strong></h1>
      <p>VoteBroker analysiert Signale im Steem-Netzwerk — Whale Discovery,
         Vote-DNA und Echtzeit-Kuratierung an einem zentralen Ort.</p>
      <div class="vb-hero-actions">
        <button class="vb-btn-primary">Jetzt starten</button>
        <button class="vb-btn-ghost">Live-Demo ansehen</button>
      </div>
    </div>
    <div class="vb-hero-mark">
      <!-- animated mark: load /assets/branding/logo/icon-animated.svg -->
      <object type="image/svg+xml" data="/assets/branding/logo/icon-animated.svg" aria-label="VoteBroker"></object>
    </div>
  </div>
</section>

<!-- ===== 3. ANIMATED NETWORK BACKGROUND (signal pulses + particles) ===== -->
<script>
(function () {
  const canvas = document.getElementById('vbNetworkBg');
  if (!canvas) return;
  const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  const ctx = canvas.getContext('2d');
  let W, H, DPR = Math.min(window.devicePixelRatio || 1, 2);
  const COLORS = ['#2563EB', '#378ADD', '#00D4FF'];
  let nodes = [], pulses = [];

  function resize() {
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * DPR; canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    initNodes();
  }
  function initNodes() {
    const count = Math.round((W * H) / 26000); // density
    nodes = [];
    for (let i = 0; i < count; i++) {
      nodes.push({
        x: Math.random() * W, y: Math.random() * H,
        vx: (Math.random() - 0.5) * 0.12, vy: (Math.random() - 0.5) * 0.12,
        r: 1 + Math.random() * 1.6,
        c: COLORS[(Math.random() * COLORS.length) | 0]
      });
    }
  }
  const LINK_DIST = 150;
  function step() {
    ctx.clearRect(0, 0, W, H);
    // move
    for (const n of nodes) {
      if (!reduce) { n.x += n.vx; n.y += n.vy; }
      if (n.x < 0 || n.x > W) n.vx *= -1;
      if (n.y < 0 || n.y > H) n.vy *= -1;
    }
    // links
    for (let i = 0; i < nodes.length; i++) {
      for (let j = i + 1; j < nodes.length; j++) {
        const a = nodes[i], b = nodes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d = Math.hypot(dx, dy);
        if (d < LINK_DIST) {
          const op = (1 - d / LINK_DIST) * 0.18;
          ctx.strokeStyle = `rgba(55,138,221,${op})`;
          ctx.lineWidth = 0.6;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
          // occasionally spawn a signal pulse along a link
          if (!reduce && Math.random() < 0.0006) {
            pulses.push({ ax: a.x, ay: a.y, bx: b.x, by: b.y, t: 0,
                          sp: 0.012 + Math.random() * 0.01 });
          }
        }
      }
    }
    // nodes
    for (const n of nodes) {
      ctx.fillStyle = n.c; ctx.globalAlpha = 0.5;
      ctx.beginPath(); ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2); ctx.fill();
    }
    ctx.globalAlpha = 1;
    // pulses travelling toward their "hub" (node b) — the "signals converge" motif
    pulses = pulses.filter(p => p.t <= 1);
    for (const p of pulses) {
      p.t += p.sp;
      const x = p.ax + (p.bx - p.ax) * p.t;
      const y = p.ay + (p.by - p.ay) * p.t;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 5);
      grad.addColorStop(0, 'rgba(103,232,249,0.9)');
      grad.addColorStop(1, 'rgba(0,212,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(x, y, 5, 0, Math.PI * 2); ctx.fill();
    }
    requestAnimationFrame(step);
  }
  window.addEventListener('resize', resize);
  resize();
  if (reduce) { // draw one static frame
    step = function(){};
    ctx.clearRect(0,0,W,H);
    for (let i=0;i<nodes.length;i++) for (let j=i+1;j<nodes.length;j++){
      const a=nodes[i],b=nodes[j],d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<LINK_DIST){ctx.strokeStyle=`rgba(55,138,221,${(1-d/LINK_DIST)*0.15})`;ctx.lineWidth=0.6;
        ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();}}
    for (const n of nodes){ctx.fillStyle=n.c;ctx.globalAlpha=0.5;
      ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill();}
  } else {
    requestAnimationFrame(step);
  }
})();
</script>
